<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>思维导图 - 税务师备考中心</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { overflow: hidden; }
    
    /* 思维导图节点样式 */
    .mm-node rect {
      rx: 8px;
      ry: 8px;
      stroke-width: 2px;
      cursor: pointer;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));
      transition: all 0.2s;
    }
    .mm-node rect:hover {
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
    }
    .mm-node text {
      cursor: pointer;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .mm-link {
      fill: none;
      stroke-width: 2px;
      stroke-opacity: 0.6;
    }
    .mm-root rect { rx: 16px; ry: 16px; }
    .mm-level1 rect { rx: 12px; ry: 12px; }
    .mm-level2 rect { rx: 8px; ry: 8px; }
    .mm-level3 rect { rx: 6px; ry: 6px; }
    
    .toggle-circle {
      cursor: pointer;
    }
    .toggle-circle circle {
      transition: all 0.2s;
    }
    .toggle-circle:hover circle {
      r: 9;
    }

    /* 搜索框 */
    .search-wrapper {
      position: absolute;
      top: 16px; right: 320px;
      z-index: 15;
      background: white;
      border-radius: 50px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      padding: 6px 16px;
    }
    .search-wrapper input {
      border: none;
      outline: none;
      font-size: 14px;
      width: 180px;
      background: transparent;
    }
    .search-wrapper .search-icon { color: #aaa; margin-right: 8px; }
    
    /* 搜索高亮 */
    .mm-node.highlighted rect {
      stroke-width: 3px !important;
      filter: drop-shadow(0 0 12px rgba(255,200,0,0.8)) !important;
    }
    
    /* 缩放控件 */
    .zoom-controls {
      position: absolute;
      bottom: 24px; right: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 15;
    }
    .zoom-btn {
      width: 36px; height: 36px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }
    .zoom-btn:hover { background: var(--bg); }
    
    /* 图例 */
    .legend {
      position: absolute;
      bottom: 24px; left: 24px;
      background: white;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      box-shadow: var(--shadow);
      font-size: 12px;
      z-index: 15;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    
    /* 收起时侧边栏 */
    .mindmap-sidebar.collapsed { width: 48px; }
    .mindmap-sidebar.collapsed .sidebar-subject-btn span:not(.subject-dot) { display: none; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📊</span>
        <div class="logo-text">
          <span class="logo-title">税务师备考中心</span>
          <span class="logo-sub">思维导图</span>
        </div>
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">首页</a>
        <a href="mindmap.html" class="nav-link active">思维导图</a>
        <a href="quiz.html" class="nav-link">刷题训练</a>
        <a href="progress.html" class="nav-link">学习进度</a>
      </nav>
    </div>
  </header>

  <div class="mindmap-layout">
    <!-- 左侧科目目录 -->
    <div class="mindmap-sidebar" id="sidebar">
      <div class="mindmap-sidebar-header">📚 科目目录</div>
      <div id="sidebar-subjects"></div>
    </div>

    <!-- 主画布 -->
    <div class="mindmap-canvas-area" id="canvas-area">
      <!-- 工具栏 -->
      <div class="mindmap-toolbar">
        <button class="toolbar-btn" onclick="expandAll()">全部展开</button>
        <button class="toolbar-btn" onclick="collapseToLevel(1)">收缩到一级</button>
        <button class="toolbar-btn" onclick="collapseToLevel(2)">收缩到二级</button>
        <button class="toolbar-btn" onclick="resetView()">复位</button>
        <button class="toolbar-btn" onclick="goToQuiz()">📝 刷这科题目</button>
      </div>

      <!-- 搜索 -->
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="搜索知识点..." oninput="searchNodes(this.value)">
      </div>

      <!-- SVG 画布 -->
      <svg id="mindmap-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#CBD5E0"/>
          </marker>
        </defs>
        <g id="mm-root-group" transform="translate(0,0) scale(1)"></g>
      </svg>

      <!-- 缩放控件 -->
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoom(1.2)">+</button>
        <button class="zoom-btn" id="zoom-label" style="font-size:11px;cursor:default;">100%</button>
        <button class="zoom-btn" onclick="zoom(0.8)">−</button>
      </div>

      <!-- 图例 -->
      <div class="legend">
        <div style="font-weight:700;margin-bottom:6px;font-size:12px;">图例</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2C3E50;width:14px;height:14px;border-radius:4px;"></div> 根节点</div>
        <div class="legend-item"><div class="legend-dot" style="background:#E74C3C;"></div> 科目节点</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3498DB;"></div> 章节节点</div>
        <div class="legend-item"><div class="legend-dot" style="background:#27AE60;"></div> 知识点节点</div>
        <div class="legend-item"><div class="legend-dot" style="background:#95A5A6;"></div> 细节节点</div>
      </div>
    </div>

    <!-- 右侧详情面板 -->
    <div class="node-detail-panel" id="detail-panel">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div id="panel-content">
        <div class="panel-title" id="panel-title"></div>
        <div class="panel-desc" id="panel-desc"></div>
        <div id="panel-children-list"></div>
        <br>
        <button class="panel-action" onclick="goToRelatedQuiz()">📝 做相关题目</button>
      </div>
    </div>
  </div>

  <script src="data/mindmap-data.js"></script>
  <script>
    // ==================== 状态 ====================
    let currentSubject = null;
    let currentData = null;
    let collapsedNodes = new Set();
    let scale = 1;
    let translateX = 60;
    let translateY = 40;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let selectedNodeId = null;

    const COLORS = {
      root: { fill: '#2C3E50', text: '#FFFFFF', stroke: '#1A252F' },
      subject: { fill: '#FFFFFF', text: '#2C3E50', stroke: '#2C3E50', headerFills: {
        tax1: '#E74C3C', tax2: '#E67E22', finance: '#27AE60', practice: '#2980B9', law: '#8E44AD'
      }},
      level2: { fill: '#F0F7FF', text: '#2C3E50', stroke: '#3498DB' },
      level3: { fill: '#F8FFF8', text: '#2C3E50', stroke: '#27AE60' },
      level4: { fill: '#FEFEFE', text: '#555', stroke: '#BDC3C7' },
    };

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', function() {
      buildSidebar();
      const params = new URLSearchParams(window.location.search);
      const subjectId = params.get('subject') || 'tax1';
      loadSubject(subjectId);
      setupDragAndDrop();
    });

    function buildSidebar() {
      const container = document.getElementById('sidebar-subjects');
      MINDMAP_DATA.children.forEach(subject => {
        const div = document.createElement('div');
        div.className = 'sidebar-subject';
        div.id = `sidebar-${subject.id}`;
        div.innerHTML = `
          <button class="sidebar-subject-btn" onclick="toggleSidebarSubject('${subject.id}')">
            <span class="subject-dot" style="background:${subject.color}"></span>
            <span>${subject.name}</span>
            <span style="margin-left:auto;font-size:12px;opacity:0.5">▼</span>
          </button>
          <div class="sidebar-chapters" id="chapters-${subject.id}">
            ${(subject.children || []).map(ch => `
              <button class="chapter-btn" onclick="loadSubjectChapter('${subject.id}', '${ch.id}')">
                ${ch.name}
              </button>
            `).join('')}
          </div>
        `;
        container.appendChild(div);
      });
    }

    function toggleSidebarSubject(id) {
      const el = document.getElementById(`sidebar-${id}`);
      el.classList.toggle('open');
      loadSubject(id);
    }

    function loadSubject(subjectId) {
      currentSubject = subjectId;
      const subject = MINDMAP_DATA.children.find(s => s.id === subjectId);
      if (!subject) return;

      // 更新侧边栏激活状态
      document.querySelectorAll('.sidebar-subject-btn').forEach(b => b.classList.remove('active'));
      const subjectEl = document.getElementById(`sidebar-${subjectId}`);
      if (subjectEl) {
        subjectEl.querySelector('.sidebar-subject-btn').classList.add('active');
        subjectEl.classList.add('open');
      }

      collapsedNodes.clear();
      currentData = subject;
      scale = 1;
      translateX = 80;
      translateY = 60;
      renderMindmap(subject);
    }

    function loadSubjectChapter(subjectId, chapterId) {
      currentSubject = subjectId;
      const subject = MINDMAP_DATA.children.find(s => s.id === subjectId);
      if (!subject) return;
      const chapter = subject.children.find(c => c.id === chapterId);
      if (!chapter) { loadSubject(subjectId); return; }

      collapsedNodes.clear();
      currentData = chapter;
      scale = 1;
      translateX = 80;
      translateY = 100;
      renderMindmap(chapter);

      document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
    }

    // ==================== 布局计算 ====================
    const XGAP = 220;  // 水平间距
    const YMIN = 36;   // 最小节点高度
    const YGAP = 8;    // 垂直间距

    function measureText(text, fontSize) {
      // 估算文字宽度（中文约1.1倍font size，英文约0.6倍）
      const chWidth = fontSize * 1.05;
      const enWidth = fontSize * 0.6;
      let w = 0;
      for (let c of text) {
        w += /[\u4e00-\u9fa5]/.test(c) ? chWidth : enWidth;
      }
      return Math.ceil(w);
    }

    function getNodeSize(node, level) {
      const fontSize = level === 0 ? 16 : level === 1 ? 14 : level === 2 ? 13 : 12;
      const textW = measureText(node.name, fontSize);
      const pw = level === 0 ? 24 : level === 1 ? 20 : 16;
      const ph = level === 0 ? 16 : 12;
      const w = Math.max(textW + pw * 2, level === 0 ? 120 : level === 1 ? 110 : 100);
      const h = Math.max(YMIN, fontSize + ph * 2);
      return { w, h, fontSize };
    }

    function buildTree(node, level) {
      const size = getNodeSize(node, level);
      const isCollapsed = collapsedNodes.has(node.id);
      const hasChildren = node.children && node.children.length > 0;
      const visibleChildren = (hasChildren && !isCollapsed) ? node.children : [];

      let subtreeChildren = visibleChildren.map(child => buildTree(child, level + 1));
      let totalHeight;
      if (subtreeChildren.length === 0) {
        totalHeight = size.h;
      } else {
        let childrenHeight = subtreeChildren.reduce((sum, c) => sum + c.totalHeight + YGAP, -YGAP);
        totalHeight = Math.max(size.h, childrenHeight);
      }

      return { node, level, size, subtreeChildren, totalHeight, isCollapsed, hasChildren };
    }

    function assignPositions(tree, x, y, parentX, parentY) {
      const cx = x;
      const cy = y + (tree.totalHeight - tree.size.h) / 2;

      tree.x = cx;
      tree.y = cy;

      let childY = y;
      tree.subtreeChildren.forEach(child => {
        assignPositions(child, x + tree.size.w + XGAP, childY, cx + tree.size.w, cy + tree.size.h / 2);
        childY += child.totalHeight + YGAP;
      });
    }

    // ==================== 渲染 ====================
    function renderMindmap(data) {
      const svg = document.getElementById('mindmap-svg');
      const g = document.getElementById('mm-root-group');
      g.innerHTML = '';

      const tree = buildTree(data, data.id === MINDMAP_DATA.id ? 0 : 1);
      assignPositions(tree, 0, 0, 0, 0);

      // 绘制连线
      renderLinks(g, tree, data.color || COLORS.root.stroke);
      // 绘制节点
      renderNodes(g, tree, data.color || COLORS.root.fill);

      updateTransform();
    }

    function renderLinks(g, tree, accentColor) {
      tree.subtreeChildren.forEach(child => {
        const x1 = tree.x + tree.size.w;
        const y1 = tree.y + tree.size.h / 2;
        const x2 = child.x;
        const y2 = child.y + child.size.h / 2;
        const mx = (x1 + x2) / 2;
        const path = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        line.setAttribute('d', path);
        line.setAttribute('class', 'mm-link');
        line.setAttribute('stroke', accentColor);
        g.appendChild(line);
        renderLinks(g, child, accentColor);
      });
    }

    function getNodeColors(tree, subjectColor) {
      const { level } = tree;
      if (level <= 1) return { fill: subjectColor || '#2C3E50', text: '#FFFFFF', stroke: subjectColor || '#1A252F' };
      if (level === 2) return { fill: '#F0F7FF', text: '#2C3E50', stroke: subjectColor || '#3498DB' };
      if (level === 3) return { fill: '#F8FFF8', text: '#2C3E50', stroke: '#A9DFBF' };
      return { fill: '#FAFAFA', text: '#555', stroke: '#D5D8DC' };
    }

    function renderNodes(g, tree, subjectColor) {
      const { x, y, size, node, level, isCollapsed, hasChildren } = tree;
      const colors = getNodeColors(tree, subjectColor);

      const nodeG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      nodeG.setAttribute('class', `mm-node mm-level${level}`);
      nodeG.setAttribute('data-id', node.id);
      nodeG.setAttribute('transform', `translate(${x},${y})`);

      // 背景矩形
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('width', size.w);
      rect.setAttribute('height', size.h);
      rect.setAttribute('fill', colors.fill);
      rect.setAttribute('stroke', colors.stroke);
      rect.setAttribute('stroke-width', level <= 1 ? 2 : 1.5);
      rect.setAttribute('rx', level === 0 ? 16 : level === 1 ? 12 : 8);
      nodeG.appendChild(rect);

      // 文字
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', size.w / 2);
      text.setAttribute('y', size.h / 2);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'central');
      text.setAttribute('fill', colors.text);
      text.setAttribute('font-size', size.fontSize);
      text.setAttribute('font-weight', level <= 1 ? '700' : level === 2 ? '600' : '400');
      text.setAttribute('font-family', "-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif");
      text.textContent = node.name;
      nodeG.appendChild(text);

      // 点击事件
      nodeG.addEventListener('click', (e) => {
        e.stopPropagation();
        onNodeClick(node, tree);
      });

      // 展开/收缩按钮
      if (hasChildren) {
        const toggleG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        toggleG.setAttribute('class', 'toggle-circle');
        toggleG.setAttribute('transform', `translate(${size.w}, ${size.h / 2})`);

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('r', 8);
        circle.setAttribute('fill', 'white');
        circle.setAttribute('stroke', colors.stroke);
        circle.setAttribute('stroke-width', 1.5);
        toggleG.appendChild(circle);

        const plus = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        plus.setAttribute('text-anchor', 'middle');
        plus.setAttribute('dominant-baseline', 'central');
        plus.setAttribute('font-size', '13');
        plus.setAttribute('fill', colors.stroke);
        plus.setAttribute('font-weight', 'bold');
        plus.textContent = isCollapsed ? '+' : '−';
        toggleG.appendChild(plus);

        toggleG.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleNode(node.id);
        });
        nodeG.appendChild(toggleG);
      }

      g.appendChild(nodeG);

      // 递归渲染子节点
      tree.subtreeChildren.forEach(child => renderNodes(g, child, subjectColor));
    }

    // ==================== 交互 ====================
    function onNodeClick(node, tree) {
      selectedNodeId = node.id;
      showDetailPanel(node);
    }

    function toggleNode(id) {
      if (collapsedNodes.has(id)) {
        collapsedNodes.delete(id);
      } else {
        collapsedNodes.add(id);
      }
      renderMindmap(currentData);
    }

    function expandAll() {
      collapsedNodes.clear();
      renderMindmap(currentData);
    }

    function collapseToLevel(targetLevel) {
      collapsedNodes.clear();
      function collectIds(node, level) {
        if (level >= targetLevel && node.children && node.children.length > 0) {
          collapsedNodes.add(node.id);
        }
        if (node.children) {
          node.children.forEach(c => collectIds(c, level + 1));
        }
      }
      collectIds(currentData, 0);
      renderMindmap(currentData);
    }

    function resetView() {
      scale = 1;
      translateX = 80;
      translateY = 60;
      updateTransform();
      document.getElementById('zoom-label').textContent = '100%';
    }

    function zoom(factor) {
      scale = Math.min(3, Math.max(0.2, scale * factor));
      updateTransform();
      document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
    }

    function updateTransform() {
      const g = document.getElementById('mm-root-group');
      g.setAttribute('transform', `translate(${translateX}, ${translateY}) scale(${scale})`);
    }

    // 拖拽
    function setupDragAndDrop() {
      const svg = document.getElementById('mindmap-svg');
      svg.addEventListener('mousedown', e => {
        if (e.target === svg || e.target.tagName === 'svg') {
          isDragging = true;
          dragStart = { x: e.clientX - translateX, y: e.clientY - translateY };
          svg.style.cursor = 'grabbing';
        }
      });
      document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        translateX = e.clientX - dragStart.x;
        translateY = e.clientY - dragStart.y;
        updateTransform();
      });
      document.addEventListener('mouseup', () => {
        isDragging = false;
        document.getElementById('mindmap-svg').style.cursor = 'grab';
      });
      // 滚轮缩放
      svg.addEventListener('wheel', e => {
        e.preventDefault();
        zoom(e.deltaY < 0 ? 1.1 : 0.9);
      }, { passive: false });
    }

    // 搜索
    function searchNodes(query) {
      document.querySelectorAll('.mm-node').forEach(n => n.classList.remove('highlighted'));
      if (!query.trim()) return;
      document.querySelectorAll('.mm-node text').forEach(t => {
        if (t.textContent.includes(query)) {
          t.closest('.mm-node').classList.add('highlighted');
        }
      });
    }

    // 详情面板
    function showDetailPanel(node) {
      document.getElementById('panel-title').textContent = node.name;
      document.getElementById('panel-desc').textContent = node.desc || '暂无详细说明';
      const childrenList = document.getElementById('panel-children-list');
      if (node.children && node.children.length > 0) {
        childrenList.innerHTML = `<div style="font-size:13px;font-weight:700;color:#555;margin-bottom:8px;">包含子节点：</div>` +
          node.children.map(c => `<div style="padding:6px 10px;background:#F8F9FA;border-radius:6px;margin-bottom:4px;font-size:13px;cursor:pointer;border:1px solid #E8ECEF" onclick="onChildClick('${c.id}', '${currentSubject}')">${c.name}</div>`).join('');
      } else {
        childrenList.innerHTML = '';
      }
      document.getElementById('detail-panel').classList.add('open');
    }

    function closePanel() {
      document.getElementById('detail-panel').classList.remove('open');
    }

    function goToQuiz() {
      window.location.href = `quiz.html?subject=${currentSubject}`;
    }

    function goToRelatedQuiz() {
      window.location.href = `quiz.html?subject=${currentSubject}&node=${selectedNodeId}`;
    }

    function onChildClick(childId, subjectId) {
      const subject = MINDMAP_DATA.children.find(s => s.id === subjectId);
      if (!subject) return;
      function findNode(node) {
        if (node.id === childId) return node;
        if (node.children) {
          for (const c of node.children) {
            const found = findNode(c);
            if (found) return found;
          }
        }
        return null;
      }
      const node = findNode(subject);
      if (node) showDetailPanel(node);
    }
  </script>
</body>
</html>
